<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Caméras Jetson Nano</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .cameras-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .camera-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .camera-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        
        .camera-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .camera-title {
            font-size: 1.3em;
            font-weight: bold;
        }
        
        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.inactive {
            background: #ef4444;
            animation: none;
        }
        
        .toggle-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .toggle-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
        
        .toggle-btn:active {
            transform: scale(0.95);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .camera-view {
            position: relative;
            width: 100%;
            padding-bottom: 75%; /* Ratio 4:3 */
            background: #1a1a1a;
        }
        
        .camera-view.inactive {
            background: #2a2a2a;
        }
        
        .camera-view img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .camera-view img.hidden {
            display: none;
        }
        
        .camera-offline {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-size: 1.5em;
            text-align: center;
        }
        
        .camera-offline-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.2em;
        }
        
        .fullscreen-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.3s ease;
        }
        
        .fullscreen-btn:hover {
            background: rgba(0,0,0,0.9);
        }
        
        .no-cameras {
            text-align: center;
            color: white;
            font-size: 1.5em;
            margin-top: 50px;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }
        
        .refresh-btn {
            background: #4ade80;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s ease;
        }
        
        .refresh-btn:hover {
            background: #22c55e;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎥 Multi-Caméras Jetson Nano</h1>
            <p class="subtitle">Visualisation en temps réel</p>
        </header>
        
        <div id="cameras-container" class="cameras-grid"></div>
        
        <div id="no-cameras" class="no-cameras" style="display: none;">
            <p>Aucune caméra détectée</p>
            <button class="refresh-btn" onclick="location.reload()">🔄 Actualiser</button>
        </div>
    </div>
    
    <script>
        async function loadCameras() {
            try {
                const response = await fetch('/api/cameras');
                const data = await response.json();
                const cameras = data.cameras;
                
                const container = document.getElementById('cameras-container');
                const noCameras = document.getElementById('no-cameras');
                
                if (cameras.length === 0) {
                    container.style.display = 'none';
                    noCameras.style.display = 'block';
                    return;
                }
                
                cameras.forEach(cameraId => {
                    const card = createCameraCard(cameraId);
                    container.appendChild(card);
                });
                
            } catch (error) {
                console.error('Erreur lors du chargement des caméras:', error);
                document.getElementById('no-cameras').style.display = 'block';
            }
        }
        
        function createCameraCard(cameraId) {
            const card = document.createElement('div');
            card.className = 'camera-card';
            
            card.innerHTML = `
                <div class="camera-header">
                    <span class="camera-title">Caméra ${cameraId}</span>
                    <div class="header-controls">
                        <button class="toggle-btn" onclick="toggleCamera(${cameraId}, this)">
                            <span class="toggle-icon">⏸</span>
                            <span class="toggle-text">Arrêter</span>
                        </button>
                        <div class="status-indicator" id="status-${cameraId}"></div>
                    </div>
                </div>
                <div class="camera-view" id="view-${cameraId}">
                    <img src="/video_feed/${cameraId}" alt="Caméra ${cameraId}" id="img-${cameraId}">
                    <button class="fullscreen-btn" onclick="toggleFullscreen(this)">⛶ Plein écran</button>
                </div>
            `;
            
            return card;
        }
        
        async function toggleCamera(cameraId, btn) {
            try {
                const response = await fetch(`/camera/${cameraId}/toggle`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                const statusIndicator = document.getElementById(`status-${cameraId}`);
                const img = document.getElementById(`img-${cameraId}`);
                const view = document.getElementById(`view-${cameraId}`);
                const icon = btn.querySelector('.toggle-icon');
                const text = btn.querySelector('.toggle-text');
                
                if (data.is_running) {
                    // Caméra activée
                    statusIndicator.classList.remove('inactive');
                    img.classList.remove('hidden');
                    view.classList.remove('inactive');
                    
                    // Supprimer le message offline s'il existe
                    const offlineMsg = view.querySelector('.camera-offline');
                    if (offlineMsg) offlineMsg.remove();
                    
                    // Recharger le flux
                    img.src = `/video_feed/${cameraId}?t=${Date.now()}`;
                    
                    icon.textContent = '⏸';
                    text.textContent = 'Arrêter';
                } else {
                    // Caméra désactivée
                    statusIndicator.classList.add('inactive');
                    img.classList.add('hidden');
                    view.classList.add('inactive');
                    
                    // Ajouter le message offline
                    const offlineMsg = document.createElement('div');
                    offlineMsg.className = 'camera-offline';
                    offlineMsg.innerHTML = `
                        <div class="camera-offline-icon">📷</div>
                        <div>Caméra désactivée</div>
                    `;
                    view.appendChild(offlineMsg);
                    
                    icon.textContent = '▶';
                    text.textContent = 'Démarrer';
                }
                
            } catch (error) {
                console.error('Erreur lors du basculement de la caméra:', error);
                alert('Erreur lors de la connexion à la caméra');
            }
        }
        
        function toggleFullscreen(btn) {
            const img = btn.parentElement.querySelector('img');
            if (!document.fullscreenElement) {
                img.requestFullscreen().catch(err => {
                    console.error('Erreur plein écran:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }
        
        // Chargement initial
        loadCameras();
    </script>
</body>
</html>
